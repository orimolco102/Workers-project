services:
  app:
    build:
      context: .
      target: production
    image: workers_proj:prod
    expose:
      - "3000"
    restart: always


  mongodb:
    restart: always

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
    volumes: 
    #הוספת הוליום וכיוונו אל המקום בו הקונפיגורציה של הסרביס נמצא.
    #שיוך הדרך מהמיקום על המחשב אל המיקום על הקונטיינר
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app