services:
  app:
    build:
      context: .
      target: production
    image: workers_proj:prod
    expose:
      - "3000"
    restart: always


  mongodb:
    restart: always

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/nginx/conf.d/default.conf:ro
    depends_on:
      - app