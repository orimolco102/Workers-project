server {
    listen 80;
    server_name workers-project.onrender.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443;
    server_name workers-project.onrender.com;

    location / {
        proxy_pass http://app:3000;
    }

    location /health {
        proxy_pass http://app:3000/health;
        access_log off;
    }
}