services:
  app:
    build: .
    ports:
      - "443:3000"

    environment:
      DB_NAME: ${DB_NAME}
      MONGO_URL: ${MONGO_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:

      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mongodata:/data/db

volumes: 
  mongodata: 