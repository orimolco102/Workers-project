services:
  app:
    image: workers_proj
    build: .
    # ports:
    #   - 443:3000

    environment:
      DB_NAME: ${DB_NAME}
      MONGO_URL: ${MONGO_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    # A widely used pattern for HTTP services
    healthcheck:
    # --eval tells mongosh to run a JavaScript snippet directly and exit, instead of opening an interactive shell session.
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    ports:
      - 27017:27017

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mongodata:/data/db

volumes:
  mongodata:
